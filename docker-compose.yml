services:
  mlflow:
    build: .
    container_name: sentiment-mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --allowed-hosts mlflow,mlflow:5000,localhost,localhost:5000,127.0.0.1,127.0.0.1:5000,0.0.0.0
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build: .
    container_name: sentiment-app
    depends_on:
      - mlflow
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: sentiment-analysis
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    entrypoint: ["python"]

  api:
    build: .
    container_name: sentiment-api
    depends_on:
      - mlflow
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: sentiment-analysis
      MODEL_PATH: /app/models/baseline_model.pkl
      REFERENCE_DATA_PATH: /app/data/processed/train.csv
      MONITORING_LOG_DIR: /app/logs
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
      - ./logs:/app/logs
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000

volumes:
  mlflow_data:
