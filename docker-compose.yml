version: '3.8'

services:
  # Sentiment Analysis API (Standalone - No MLflow required)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentiment-api
    ports:
      - "8000:8000"
    environment:
      - API_KEY=${API_KEY:-dev-key-change-in-production}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - ENVIRONMENT=production
      - MODEL_TYPE=baseline
      - MODEL_PATH=/app/models/baseline_model.pkl
    volumes:
      - ./models:/app/models:ro
      - ./logs:/app/logs
    networks:
      - sentiment-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  sentiment-network:
    driver: bridge
